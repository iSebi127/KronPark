services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kronpark-backend
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kronpark
      DB_USERNAME: kronpark
      DB_PASSWORD: kronpark
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./KronPark-FrontEnd
      dockerfile: Dockerfile
    container_name: kronpark-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: kronpark-postgres
    environment:
      POSTGRES_DB: kronpark
      POSTGRES_USER: kronpark
      POSTGRES_PASSWORD: kronpark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
