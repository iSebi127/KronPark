spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kronpark}
spring.datasource.username=${DB_USERNAME:kronpark}
spring.datasource.password=${DB_PASSWORD:kronpark}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
