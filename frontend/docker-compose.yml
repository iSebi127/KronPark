version: '3.8'

services:
  app:
    build: .
    container_name: kronpark-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app                
      - /app/node_modules     
    environment:
      - CHOKIDAR_USEPOLLING=true 
      - WDS_SOCKET_PORT=0
      - NODE_ENV=development
    command: npm start            
    stdin_open: true              
    tty: true                    
   
    restart: unless-stopped